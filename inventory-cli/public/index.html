<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Management</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Inventory Management</h1>
      <p class="subtitle">Add products, update stock, and import CSV</p>
    </header>

    <section class="card">
      <h2>Add product</h2>
      <form id="add-form" class="form-row">
        <input name="id" placeholder="Product ID (SKU)" required />
        <input name="name" placeholder="Name" required />
        <input name="quantity" type="number" min="0" step="1" placeholder="Qty" required />
        <button type="submit">Add</button>
      </form>
      <p id="add-message" class="message" aria-live="polite"></p>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Products</h2>
        <button id="refresh-btn" type="button" class="secondary">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Qty</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="product-rows"></tbody>
        </table>
      </div>
      <p id="empty-state" class="empty hidden">No products yet. Add one or import a CSV.</p>
    </section>

    <section class="card">
      <h2>Import CSV</h2>
      <form id="import-form" class="form-row">
        <input type="file" name="file" accept=".csv,text/csv" required />
        <button type="submit">Import</button>
      </form>
      <p class="hint">Try <code>incoming_stock.csv</code> from the project root.</p>
      <pre id="import-report" class="report" aria-live="polite"></pre>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
